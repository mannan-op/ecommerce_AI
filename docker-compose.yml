services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ecommerce-media --ignore-existing;
      mc anonymous set download local/ecommerce-media;
      exit 0;
      "

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgres://ecommerce:ecommerce@db:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_STORAGE_BUCKET_NAME: ecommerce-media
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_CUSTOM_DOMAIN: localhost:9000/ecommerce-media
      AWS_S3_URL_PROTOCOL: "http:"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      DEFAULT_PAYMENT_PROVIDER: demo
      DEFAULT_TRYON_PROVIDER: auto
      PAYMENT_CURRENCY: usd
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    volumes:
      - ./apps/backend:/app

  celery:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgres://ecommerce:ecommerce@db:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_STORAGE_BUCKET_NAME: ecommerce-media
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_CUSTOM_DOMAIN: localhost:9000/ecommerce-media
      AWS_S3_URL_PROTOCOL: "http:"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend,celery
      DEFAULT_TRYON_PROVIDER: auto
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      backend:
        condition: service_started
    volumes:
      - ./apps/backend:/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
