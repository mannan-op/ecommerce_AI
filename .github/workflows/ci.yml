name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Run migrations
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py migrate --noinput --settings=config.settings_test

      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: pytest

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=@ecommerce/types

      - name: ESLint
        run: npm run lint --workspace=@ecommerce/frontend

      - name: Build
        run: npm run build --workspace=@ecommerce/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
